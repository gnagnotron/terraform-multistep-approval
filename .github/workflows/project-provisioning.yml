name: Project Provisioning

on:
  issues:
    types: [opened]

permissions:
  issues: write
  contents: read

env:
  PATH_TO_TFSCRIPT_BTP: infra/BTP

jobs:
  create-or-update-subaccounts:
    name: Create or Update BTP Setup
    if: ${{ !github.event.issue.pull_request && contains(github.event.issue.title, '[ACCOUNT REQUEST]') }}
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Extract Issue Data
        id: extract_data
        uses: issue-ops/parser@v4
        with:
          body: ${{ github.event.issue.body }}
          issue-form-template: account_request.yml

      - name: Build Terraform Inputs
        id: tf_inputs
        shell: bash
        env:
          GLOBALACCOUNT_DEFAULT: ${{ secrets.GLOBALACCOUNT }}
        run: |
          set -euo pipefail

          echo '${{ steps.extract_data.outputs.json }}' | jq '.' > local.json

          globalaccount=$(jq -r '.["globalaccount"] // ""' local.json)
          if [ -z "$globalaccount" ]; then
            globalaccount="$GLOBALACCOUNT_DEFAULT"
          fi
          if [ -z "$globalaccount" ]; then
            echo "Error: globalaccount is empty. Provide it in the issue form or set the GLOBALACCOUNT environment secret."
            exit 1
          fi

          project_name=$(jq -r '.["project-name"] // ""' local.json)
          project_costcenter=$(jq -r '.["cost-center"] // ""' local.json)
          integration_suite_enabled=$(jq -r '.["integration-suite-enabled"][0] // "false"' local.json)
          integration_suite_assign_roles=$(jq -r '.["integration-suite-assign-roles-to-full-admins"][0] // "false"' local.json)
          integration_suite_service_name=$(jq -r '.["integration-suite-service-name"] // "integrationsuite-trial"' local.json)
          integration_suite_plan_name=$(jq -r '.["integration-suite-plan-name"] // ""' local.json)
          integration_suite_entitlement_amount=$(jq -r '.["integration-suite-entitlement-amount"] // "1"' local.json)

          subaccount_full_admins_json=$(jq -c -r '
            (.["subaccount-full-admins"] // "")
            | split("\n")
            | map(gsub("^\\s+|\\s+$"; ""))
            | map(select(length > 0))
          ' local.json)

          integration_suite_admin_users_json=$(jq -c -r '
            (.["integration-suite-admin-users"] // "")
            | split("\n")
            | map(gsub("^\\s+|\\s+$"; ""))
            | map(select(length > 0))
          ' local.json)

          integration_suite_subaccounts_json=$(jq -c -r '
            (.["integration-suite-subaccounts"] // [])
            | if type == "array" then
                map(tostring)
              elif type == "string" then
                split("\n") | map(gsub("^\\s+|\\s+$"; "")) | map(select(length > 0))
              else
                []
              end
          ' local.json)

          integration_suite_plan_candidates_json=$(jq -c -r '
            (.["integration-suite-plan-candidates"] // "")
            | split("\n")
            | map(gsub("^\\s+|\\s+$"; ""))
            | map(select(length > 0))
          ' local.json)

          {
            echo "globalaccount=$globalaccount"
            echo "project_name=$project_name"
            echo "project_costcenter=$project_costcenter"
            echo "integration_suite_enabled=$integration_suite_enabled"
            echo "integration_suite_assign_roles=$integration_suite_assign_roles"
            echo "integration_suite_service_name=$integration_suite_service_name"
            echo "integration_suite_plan_name=$integration_suite_plan_name"
            echo "integration_suite_entitlement_amount=$integration_suite_entitlement_amount"
            echo "subaccount_full_admins_json=$subaccount_full_admins_json"
            echo "integration_suite_admin_users_json=$integration_suite_admin_users_json"
            echo "integration_suite_subaccounts_json=$integration_suite_subaccounts_json"
            echo "integration_suite_plan_candidates_json=$integration_suite_plan_candidates_json"
          } >> "$GITHUB_OUTPUT"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_wrapper: false

      - name: Terraform Init
        shell: bash
        run: terraform -chdir=${{ env.PATH_TO_TFSCRIPT_BTP }} init -no-color

      - name: Terraform Apply
        shell: bash
        env:
          BTP_USERNAME: ${{ secrets.BTP_USERNAME }}
          BTP_PASSWORD: ${{ secrets.BTP_PASSWORD }}
          TF_VAR_globalaccount: ${{ steps.tf_inputs.outputs.globalaccount }}
          TF_VAR_project_name: ${{ steps.tf_inputs.outputs.project_name }}
          TF_VAR_project_costcenter: ${{ steps.tf_inputs.outputs.project_costcenter }}
          TF_VAR_subaccount_full_admins: ${{ steps.tf_inputs.outputs.subaccount_full_admins_json }}
          TF_VAR_integration_suite_enabled: ${{ steps.tf_inputs.outputs.integration_suite_enabled }}
          TF_VAR_integration_suite_subaccounts: ${{ steps.tf_inputs.outputs.integration_suite_subaccounts_json }}
          TF_VAR_integration_suite_admin_users: ${{ steps.tf_inputs.outputs.integration_suite_admin_users_json }}
          TF_VAR_integration_suite_assign_roles_to_full_admins: ${{ steps.tf_inputs.outputs.integration_suite_assign_roles }}
          TF_VAR_integration_suite_service_name: ${{ steps.tf_inputs.outputs.integration_suite_service_name }}
          TF_VAR_integration_suite_plan_name: ${{ steps.tf_inputs.outputs.integration_suite_plan_name }}
          TF_VAR_integration_suite_plan_name_candidates: ${{ steps.tf_inputs.outputs.integration_suite_plan_candidates_json }}
          TF_VAR_integration_suite_entitlement_amount: ${{ steps.tf_inputs.outputs.integration_suite_entitlement_amount }}
        run: terraform -chdir=${{ env.PATH_TO_TFSCRIPT_BTP }} apply -auto-approve -no-color

      - name: Capture Terraform Outputs
        id: tf_output
        shell: bash
        run: |
          terraform -chdir=${{ env.PATH_TO_TFSCRIPT_BTP }} output -json > output_btp.json
          echo "subaccount_urls=$(jq -c '.subaccount_urls.value' output_btp.json)" >> "$GITHUB_OUTPUT"
          echo "integration_suite_subscription_urls=$(jq -c '.integration_suite_subscription_urls.value // {}' output_btp.json)" >> "$GITHUB_OUTPUT"

      - name: Comment Back To Issue
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.issue.number }}
          body: |
            Provisioning completed.

            Subaccount URLs:
            `${{ steps.tf_output.outputs.subaccount_urls }}`

            Integration Suite Subscription URLs:
            `${{ steps.tf_output.outputs.integration_suite_subscription_urls }}`

            Applied from issue form inputs through TF_VAR_* environment variables.
